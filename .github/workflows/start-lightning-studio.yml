# .github/workflows/start-lightning-studio.yml
#
# ┌─────────────────────────────────────────────────────────────┐
# │  Required GitHub Repository Secrets                         │
# │                                                             │
# │  LIGHTNING_USER_ID   ← lightning.ai → Avatar →             │
# │                          Settings → Keys → Programmatic     │
# │  LIGHTNING_API_KEY   ← same place                          │
# └─────────────────────────────────────────────────────────────┘
#
# Place start_studio.py (provided alongside this file) at the
# root of your repository, then commit both files.

name: Start Lightning AI Studio

on:
  workflow_dispatch:
    inputs:
      studio_name:
        description: "claw"
        required: true
        default: "claw"
      teamspace:
        description: "claw"
        required: false
        default: "claw"
      machine:
        description: "CPU"
        required: false
        default: "CPU"

jobs:
  start-studio:
    name: Start Lightning AI Studio
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      STUDIO_NAME:      ${{ inputs.studio_name }}
      STUDIO_TEAMSPACE: ${{ inputs.teamspace }}
      STUDIO_MACHINE:   ${{ inputs.machine }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightning-sdk
        run: pip install --quiet lightning-sdk

      - name: Start Studio
        env:
          LIGHTNING_USER_ID: ${{ secrets.LIGHTNING_USER_ID }}
          LIGHTNING_API_KEY: ${{ secrets.LIGHTNING_API_KEY }}
        run: python start_studio.py
